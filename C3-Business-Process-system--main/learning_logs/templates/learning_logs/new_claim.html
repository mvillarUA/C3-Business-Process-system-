{% extends "learning_logs/base.html" %}

{% block content %}

<div class="max-w-4xl mx-auto">

    <!-- Title -->
    <h2 class="text-2xl font-semibold mb-6">Submit Claim</h2>

    <!-- Tabs -->
    <div class="flex space-x-6 border-b mb-6 text-gray-600">
        <span class="pb-2 border-b-2 border-blue-600 text-blue-600">Claim Details</span>
        <span class="pb-2">Documents</span>
        <span class="pb-2">Review</span>
        <span class="pb-2">Submit</span>
    </div>

    <!-- Form Card -->
    <div class="bg-white shadow-md rounded-xl p-6">

        <h3 class="text-lg font-semibold mb-4">Claim Information</h3>

        <form method="post">
            {% csrf_token %}

            <div class="grid grid-cols-2 gap-4">

                <!-- Policy Number -->
                <div>
                    <label class="block text-sm font-medium">
                        Policy Number <span class="text-red-500">*</span>
                    </label>
                    <input type="text" name="policy_number"
                        class="w-full border rounded-lg px-3 py-2 mt-1 focus:ring focus:ring-blue-200">
                </div>

                <!-- VIN -->
                <div>
                    <label class="block text-sm font-medium">
                        VIN <span class="text-red-500">*</span>
                    </label>
                    <input type="text" name="vin"
                        class="w-full border rounded-lg px-3 py-2 mt-1 focus:ring focus:ring-blue-200">
                </div>

                <!-- Dealership -->
                <div>
                    <label class="block text-sm font-medium">
                        Dealership <span class="text-red-500">*</span>
                    </label>
                    <input type="text" name="title"
                        class="w-full border rounded-lg px-3 py-2 mt-1 focus:ring focus:ring-blue-200">
                </div>
                
                <!-- Claim Amount -->
                <div>
                    <label class="block text-sm font-medium">
                        Claim Amount <span class="text-red-500">*</span>
                    </label>
                    <input type="text" name="claim_amount"
                        class="w-full border rounded-lg px-3 py-2 mt-1 focus:ring focus:ring-blue-200">
                </div>

                <!-- Description -->
                <div class="col-span-2">
                    <label class="block text-sm font-medium">
                        Description
                    </label>
                    <textarea name="description"
                        class="w-full border rounded-lg px-3 py-2 mt-1"></textarea>
                </div>

            

            </div>

            <div class="mt-6 flex space-x-4">

            <!-- Save Draft -->
            <button type="submit" name="action" value="draft"
                class="bg-gray-500 text-white px-6 py-2 rounded-lg hover:bg-gray-600">
                Save Draft
            </button>

            <!-- Next -->
            <button type="submit" name="action" value="next"
                class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                Next
            </button>

</div>

        </form>
    </div>

</div>

{% endblock %}
