{% extends "learning_logs/base.html" %}

{% block content %}

<div class="max-w-4xl mx-auto">

    <h2 class="text-2xl font-semibold mb-6">Submit Claim</h2>

    <div class="bg-white shadow-md rounded-xl p-6">
        <h3 class="text-lg font-semibold mb-4">Claim Information</h3>

        {% if error_message %}
            <div class="mb-4 p-3 rounded-lg bg-red-100 text-red-700">
                {{ error_message }}
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="grid grid-cols-2 gap-4">

                <div>
                    <label class="block text-sm font-medium">
                        Vehicle ID <span class="text-red-500">*</span>
                    </label>
                    <input type="number" name="vehicleid"
                        class="w-full border rounded-lg px-3 py-2 mt-1 focus:ring focus:ring-blue-200" required>
                </div>

                <div>
                    <label class="block text-sm font-medium">
                        Claim Amount <span class="text-red-500">*</span>
                    </label>
                    <input type="number" step="0.01" name="claimamount"
                        class="w-full border rounded-lg px-3 py-2 mt-1 focus:ring focus:ring-blue-200" required>
                </div>

                <div class="col-span-2">
                    <label class="block text-sm font-medium">
                        Description
                    </label>
                    <textarea name="description"
                        class="w-full border rounded-lg px-3 py-2 mt-1"></textarea>
                </div>

            </div>

            <div class="mt-6 flex space-x-4">
                <button type="submit"
                    class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                    Create Claim
                </button>
            </div>

        </form>
    </div>

</div>

{% endblock %}
