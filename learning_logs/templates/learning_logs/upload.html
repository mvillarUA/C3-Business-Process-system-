{% extends "learning_logs/base.html" %}

{% block content %}

<div class="max-w-3xl mx-auto">
    <h2 class="text-2xl font-semibold mb-6">Upload Documents</h2>

    <!-- Tabs -->
    <div class="flex space-x-6 border-b mb-6">
        <span>Documents</span>
        <span class="border-b-2 border-blue-600 text-blue-600">Upload</span>
        <span>Review</span>
        <span>Submit</span>
    </div>

    <div class="bg-white shadow-md rounded-xl p-6">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <label class="block mb-2 font-medium">Upload File</label>
            <input type="file" name="attachment" class="mb-4">

            <button class="bg-blue-600 text-white px-4 py-2 rounded">
                Next
            </button>
        </form>
    </div>
</div>

{% endblock %}
