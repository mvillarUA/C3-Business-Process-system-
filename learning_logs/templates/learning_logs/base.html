<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Digital Unified System (DUS)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 text-slate-900">

    <header class="bg-white border-b border-slate-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex items-center justify-between h-20">
                <h1 class="text-2xl font-bold tracking-tight">C3 Dealer Portal</h1>

                <div class="flex items-center gap-8 text-sm">
                    <div class="flex items-center gap-2 text-slate-600">
                        <span>🏢</span>
                        <span class="font-medium">ABC Motors</span>
                    </div>

                    <div class="flex items-center gap-2 text-slate-600">
                        <span>👤</span>
                        <span class="font-medium">{{ request.user.username|default:"Manager" }}</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10">
        {% block content %}
        {% endblock content %}
    </main>

<a href="{% url 'logout' %}" class="text-sm text-gray-600">
    Logout
</a>

</body>
</html>
